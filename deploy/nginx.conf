server {
    listen 80;
    server_name _;   # Replace _ with your domain or EC2 public IP

    root /var/www/ai_video_platform/backend/public;
    index index.php;

    # ── Laravel app ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # ── Static assets (Vite build) ───────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Python worker proxy (internal only) ──────────────────
    # Uncomment if you ever need to expose worker endpoints via /api/worker/
    # location /api/worker/ {
    #     proxy_pass http://127.0.0.1:8001/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_read_timeout 300s;
    # }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Hide sensitive files ──────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    client_max_body_size 256M;
    error_log  /var/log/nginx/videoai_error.log;
    access_log /var/log/nginx/videoai_access.log;
}
